<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AviControl Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0d1a0d;font-family:'Barlow Condensed',sans-serif;color:#e0f0e0;display:flex;flex-direction:column;min-height:100vh}
    #root{flex:1}
    #root:empty::after {
      content: 'Iniciando sistema...';
      display: block; text-align: center; margin-top: 100px; color: #f59e0b; font-weight: bold;
    }
    input,select{background:#162316;border:1.5px solid #2d4d2d;color:#e0f0e0;padding:12px;border-radius:7px;width:100%;font-family:inherit;outline:none;margin-bottom:10px}
    .card{background:#162316;border:1px solid #2a422a;border-radius:9px;padding:14px;margin-bottom:12px}
    .btn{background:#f59e0b;color:#000;padding:12px;border-radius:8px;font-weight:700;border:none;cursor:pointer;width:100%;text-transform:uppercase}
    .nav-btn{flex:1;padding:15px 0;text-align:center;font-size:11px;font-weight:700;color:#4a6a4a;background:none;border:none;border-top:3px solid transparent}
    .nav-btn.active{color:#f59e0b;border-top-color:#f59e0b}
    table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
    th,td{border:1px solid #2a422a;padding:8px;text-align:center}
    th{background:#223322;color:#f59e0b}
  </style>
</head>
<body>
  <div id="root"></div>

<script>
// Verificación de carga de librerías
window.onload = () => {
  if (typeof React === 'undefined') {
    document.getElementById('root').innerHTML = "<div style='padding:20px; text-align:center;'>Error: No hay conexión a internet para cargar las librerías.</div>";
    return;
  }

  const { useState, useEffect } = React;

  const getStdW = (day) => {
    const std = {1:45,7:185,14:470,21:930,28:1610,35:2200,42:2800};
    if(std[day]) return std[day];
    const keys = Object.keys(std).map(Number).sort((a,b)=>a-b);
    for(let i=0;i<keys.length-1;i++){
      if(day>keys[i]&&day<keys[i+1]){
        const t=(day-keys[i])/(keys[i+1]-keys[i]);
        return Math.round(std[keys[i]]+t*(std[keys[i+1]]-std[keys[i]]));
      }
    }
    return 2800;
  };

  const App = () => {
    const [data, setData] = useState(() => JSON.parse(localStorage.getItem('avicontrol_v4')) || {lots:[], records:[]});
    const [tab, setTab] = useState('lotes');
    const [activeLotId, setActiveLotId] = useState(null);
    const [editingRecord, setEditingRecord] = useState(null);

    useEffect(() => { localStorage.setItem('avicontrol_v4', JSON.stringify(data)); }, [data]);

    const activeLot = data.lots.find(l => l.id === activeLotId);
    const records = data.records.filter(r => r.lotId === activeLotId).sort((a,b)=>new Date(b.date)-new Date(a.date));

    const saveRecord = (rec) => {
      const newRecords = [...data.records.filter(r => !(r.lotId === activeLotId && r.date === rec.date)), rec];
      setData({...data, records: newRecords});
      setTab('historial');
    };

    return React.createElement('div', {style: {paddingBottom:'80px'}},
      React.createElement('div', {style: {padding:'15px', textAlign:'center', background:'#162316', borderBottom:'2px solid #f59e0b'}},
        React.createElement('h2', {style: {margin:0, color:'#f59e0b'}}, "AVICONTROL PRO"),
        activeLot && React.createElement('small', {style: {color:'#8aaa8a'}}, `${activeLot.name} | ${activeLot.breed}`)
      ),
      React.createElement('div', {style: {padding:'15px'}},
        tab === 'lotes' && React.createElement(LotesView, {data, onSelect: (id)=>{setActiveLotId(id); setTab('dash')}, onNew: ()=>setTab('nuevo')}),
        tab === 'dash' && activeLot && React.createElement(Dashboard, {lot: activeLot, records}),
        tab === 'reg' && activeLot && React.createElement(Registro, {lot: activeLot, onSave: saveRecord}),
        tab === 'historial' && activeLot && React.createElement(Historial, {records}),
        tab === 'nuevo' && React.createElement(NuevoLote, {onSave: (l)=>{setData({...data, lots:[...data.lots, l]}); setActiveLotId(l.id); setTab('lotes')}})
      ),
      React.createElement('nav', {style: {position:'fixed', bottom:0, width:'100%', background:'#162316', display:'flex', borderTop:'1.5px solid #2a422a'}},
        ['lotes', 'dash', 'reg', 'historial'].map(t => 
          React.createElement('button', {
            key: t,
            className: `nav-btn ${tab===t?'active':''}`,
            onClick: ()=>setTab(t)
          }, t.toUpperCase())
        )
      )
    );
  };

  const LotesView = ({data, onSelect, onNew}) => (
    React.createElement('div', null,
      React.createElement('button', {className:'btn', onClick:onNew, style:{marginBottom:'15px'}}, "+ NUEVO LOTE"),
      data.lots.map(l => React.createElement('div', {key:l.id, className:'card', onClick:()=>onSelect(l.id)}, 
        React.createElement('strong', null, l.name),
        React.createElement('div', {style:{fontSize:'12px', color:'#f59e0b'}}, l.breed)
      ))
    )
  );

  const Dashboard = ({lot, records}) => {
    const totalMort = records.reduce((sum, r) => sum + Number(r.mort), 0);
    const lastW = records?.weight || 0;
    return React.createElement('div', null,
      React.createElement('div', {className:'card', style:{textAlign:'center'}},
        React.createElement('div', {style:{fontSize:'11px', color:'#8aaa8a'}}, "MORTALIDAD ACUMULADA"),
        React.createElement('div', {style:{fontSize:'24px', fontWeight:'bold', color:'#f87171'}}, `${((totalMort/lot.initialBirds)*100).toFixed(2)}%`)
      ),
      React.createElement('div', {className:'card', style:{textAlign:'center'}},
        React.createElement('div', {style:{fontSize:'11px', color:'#8aaa8a'}}, "ÚLTIMO PESO"),
        React.createElement('div', {style:{fontSize:'30px', fontWeight:'bold'}}, `${lastW}g`)
      )
    )
  };

  const Registro = ({lot, onSave}) => {
    const [wt, setWt] = useState('');
    const [mt, setMt] = useState(0);
    const [dt, setDt] = useState(new Date().toISOString().split('T'));
    const day = Math.floor((new Date(dt) - new Date(lot.startDate))/864e5)+1;

    return React.createElement('div', {className:'card'},
      React.createElement('h3', null, "Registro Diario"),
      React.createElement('input', {type:'date', value:dt, onChange:e=>setDt(e.target.value)}),
      React.createElement('div', {style:{display:'flex', gap:'10px'}},
        React.createElement('input', {type:'number', placeholder:'Peso (g)', onChange:e=>setWt(e.target.value)}),
        React.createElement('input', {type:'number', placeholder:'Bajas', onChange:e=>setMt(e.target.value)})
      ),
      React.createElement('button', {className:'btn', onClick:()=>onSave({day, weight:wt, mort:mt, date:dt, lotId:lot.id})}, "GUARDAR")
    );
  };

  const Historial = ({records}) => (
    React.createElement('table', null,
      React.createElement('thead', null, React.createElement('tr', null, 
        ['Día', 'Peso', 'Bajas'].map(h => React.createElement('th', {key:h}, h))
      )),
      React.createElement('tbody', null, records.map(r => React.createElement('tr', {key:r.date},
        React.createElement('td', null, r.day),
        React.createElement('td', null, `${r.weight}g`),
        React.createElement('td', null, r.mort)
      )))
    )
  );

  const NuevoLote = ({onSave}) => {
    const [n, setN] = useState('');
    const [c, setC] = useState(500);
    return React.createElement('div', {className:'card'},
      React.createElement('h3', null, "Nuevo Lote"),
      React.createElement('input', {placeholder:'Nombre Galpón', onChange:e=>setN(e.target.value)}),
      React.createElement('input', {type:'number', placeholder:'Cantidad Aves', onChange:e=>setC(e.target.value)}),
      React.createElement('button', {className:'btn', onClick:()=>onSave({id:Date.now(), name:n, breed:'Cobb 500', initialBirds:Number(c), startDate:new Date().toISOString().split('T')})}, "CREAR")
    );
  };

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
};
</script>
</body>
</html>
