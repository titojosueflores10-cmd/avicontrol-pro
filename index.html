<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#0a0c0f"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <title>AviControl Pro</title>
    
    <link rel="manifest" href="data:application/json,{'name':'AviControl Pro','short_name':'AviControl','start_url':'.','display':'standalone','background_color':'#0a0c0f','theme_color':'#f0a500','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3241/3241381.png','sizes':'512x512','type':'image/png'}]}">

    <style>
        :root {
            --primary: #f0a500;
            --bg: #0a0c0f;
            --card: #161b22;
            --text: #ffffff;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Splash Screen Estilo Claude */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .header {
            padding: 20px;
            background: var(--card);
            text-align: center;
            border-bottom: 2px solid var(--primary);
            sticky: top;
        }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .stat-box {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .val { font-size: 1.4rem; font-weight: bold; display: block; color: var(--primary); }
        .lbl { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1117;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .alert-ok { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid var(--success); }
        .alert-bad { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid var(--danger); }

        /* Barra de Navegación */
        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--border);
        }

        .nav-item { font-size: 0.75rem; color: #8b949e; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color: var(--primary); font-size: 3rem; margin: 0;">🥚</h1>
    <h2 style="margin: 10px 0;">AviControl Pro</h2>
    <p style="color: #8b949e;">Cargando sistema...</p>
</div>

<div class="header">
    <h2 style="margin:0; font-size: 1.2rem;">AviControl Pro</h2>
    <small id="batchInfo" style="color: var(--primary);">Sin lote activo</small>
</div>

<div class="container">
    <div id="v-home">
        <div class="card">
            <div class="stat-grid">
                <div class="stat-box" id="boxPostura">
                    <span class="lbl">Postura Real</span>
                    <span id="resPostura" class="val">0%</span>
                </div>
                <div class="stat-box" id="boxBalance">
                    <span class="lbl">Balance Hoy</span>
                    <span id="resBalance" class="val">Q 0.00</span>
                </div>
            </div>
            <div id="resAlert" class="alert"></div>
        </div>

        <div class="card">
            <h4 style="margin:0 0 15px 0; color: var(--primary);">✍️ Registro del Día</h4>
            <label class="lbl">Huevos Recolectados</label>
            <input type="number" id="inHuevos" placeholder="Ej. 450">
            
            <label class="lbl">Alimento Consumido (Libras)</label>
            <input type="number" id="inAlimento" placeholder="Ej. 110">
            
            <button class="btn" onclick="saveData()">GUARDAR REGISTRO</button>
        </div>
    </div>

    <div id="v-config" class="hidden">
        <div class="card">
            <h4 style="margin:0 0 15px 0; color: var(--primary);">⚙️ Configuración del Lote</h4>
            <label class="lbl">Cantidad Total de Aves</label>
            <input type="number" id="confAves" placeholder="500">
            
            <label class="lbl">Precio Venta (Q por huevo)</label>
            <input type="number" step="0.01" id="confPrecio" placeholder="1.25">
            
            <label class="lbl">Costo Alimento (Q por libra)</label>
            <input type="number" step="0.01" id="confCosto" placeholder="4.20">
            
            <button class="btn" onclick="updateConfig()">ACTUALIZAR CONFIGURACIÓN</button>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" id="nav-home" onclick="showV('home')">🏠 INICIO</div>
    <div class="nav-item" id="nav-config" onclick="showV('config')">⚙️ AJUSTES</div>
</div>

<script>
    // Sistema de Datos Unificado
    let db = JSON.parse(localStorage.getItem('avi_pro_db')) || {
        conf: { aves: 0, precio: 1.25, costo: 4.50 },
        logs: []
    };

    // Splash Screen Logic
    setTimeout(() => {
        const s = document.getElementById('splash');
        s.style.opacity = '0';
        setTimeout(() => s.style.display = 'none', 500);
    }, 1500);

    function showV(v) {
        document.getElementById('v-home').classList.toggle('hidden', v !== 'home');
        document.getElementById('v-config').classList.toggle('hidden', v !== 'config');
        document.getElementById('nav-home').classList.toggle('active', v === 'home');
        document.getElementById('nav-config').classList.toggle('active', v === 'config');
        if(v === 'config') fillConf();
    }

    function fillConf() {
        document.getElementById('confAves').value = db.conf.aves || "";
        document.getElementById('confPrecio').value = db.conf.precio;
        document.getElementById('confCosto').value = db.conf.costo;
    }

    function updateConfig() {
        const aves = parseInt(document.getElementById('confAves').value);
        if(!aves || aves <= 0) return alert("Por favor ingresa la cantidad de aves");

        db.conf = {
            aves: aves,
            precio: parseFloat(document.getElementById('confPrecio').value) || 1.25,
            costo: parseFloat(document.getElementById('confCosto').value) || 4.50
        };
        save();
        alert("Configuración guardada");
        showV('home');
        render();
    }

    function saveData() {
        if(!db.conf.aves) return alert("Primero configura tu lote en Ajustes");
        
        const h = parseInt(document.getElementById('inHuevos').value);
        const a = parseFloat(document.getElementById('inAlimento').value);
        
        if(isNaN(h) || isNaN(a)) return alert("Ingresa valores válidos");

        const ingresos = h * db.conf.precio;
        const gastos = a * db.conf.costo;
        const balance = ingresos - gastos;

        db.logs.push({
            h, a, balance, 
            postura: (h / db.conf.aves) * 100,
            fecha: new Date().toLocaleDateString()
        });

        save();
        render();
        document.getElementById('inHuevos').value = "";
        document.getElementById('inAlimento').value = "";
        alert("¡Registro de hoy guardado!");
    }

    function save() { localStorage.setItem('avi_pro_db', JSON.stringify(db)); }

    function render() {
        if(!db.conf.aves) {
            document.getElementById('batchInfo').innerText = "⚠️ Lote no configurado";
            return;
        }

        document.getElementById('batchInfo').innerText = `Lote Activo: ${db.conf.aves} aves`;
        
        if(db.logs.length > 0) {
            const last = db.logs[db.logs.length - 1];
            document.getElementById('resPostura').innerText = last.postura.toFixed(1) + "%";
            document.getElementById('resBalance').innerText = "Q " + last.balance.toFixed(2);
            
            const alertBox = document.getElementById('resAlert');
            const boxBalance = document.getElementById('boxBalance');
            alertBox.style.display = 'block';

            if(last.balance < 0) {
                alertBox.className = "alert alert-bad";
                alertBox.innerText = "⚠️ Hoy perdiste dinero: El costo del alimento subió o la postura bajó.";
                boxBalance.style.borderColor = "var(--danger)";
            } else {
                alertBox.className = "alert alert-ok";
                alertBox.innerText = "✅ ¡Operación rentable! Sigue así.";
                boxBalance.style.borderColor = "var(--success)";
            }
        }
    }

    // Registro automático de Service Worker para PWA
    if ('serviceWorker' in navigator) {
        const swCode = `const cacheName='avi-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    window.onload = render;
</script>
</body>
</html>
